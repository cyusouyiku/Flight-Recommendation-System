server:
  port: 8080
  servlet:
    context-path: /

spring:
  application:
    name: springboot-app
  datasource:
    url: jdbc:h2:mem:flightdb
    driver-class-name: org.h2.Driver
    username: sa
    password:
    hikari:
      connection-timeout: 30000
      maximum-pool-size: 10
      minimum-idle: 5
  h2:
    console:
      enabled: true
  flyway:
    enabled: true
    locations: classpath:db/migration
  sql:
    init:
      mode: never

mybatis:
  mapper-locations: classpath:mapper/*.xml
  configuration:
    map-underscore-to-camel-case: true

logging:
  level:
    root: INFO
    com.example: DEBUG
